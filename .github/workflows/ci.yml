name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for OIDC: GitHub mints a JWT and AWS verifies it.
permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: multi-env-cicd-pipeline

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

  build-scan-push:
    name: Build, Scan, Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag (short git SHA)
        id: meta
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.meta.outputs.tag }}" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            --load \
            -t "$IMAGE_NAME:${{ steps.meta.outputs.tag }}" \
            .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library

      # Push only on main (not PRs from forks/branches)
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ECR_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker tag "$IMAGE_NAME:$TAG" "$ECR_URI:$TAG"
          docker push "$ECR_URI:$TAG"
          echo ""
          echo "Pushed: $ECR_URI:$TAG"
