name: cd

on:
  # Auto-deploy to dev whenever CI completes successfully on main
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

  # Deploy to staging then prod (with approval) on a version tag push
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: multi-env-cicd-pipeline
  HELM_VERSION: v3.16.4
  KUBECTL_VERSION: v1.31.0

jobs:
  # ===== AUTO-DEPLOY TO DEV (on every successful main CI run) =====
  deploy-dev:
    name: Deploy to dev
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: http://${{ vars.K3S_HOST }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)"
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Refresh ECR imagePullSecret
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          kubectl create secret docker-registry ecr-pull \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ vars.AWS_REGION }})" \
            --namespace=dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          ECR_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}"
          helm upgrade --install myapp ./chart \
            -f chart/values-dev.yaml \
            --set image.repository="$ECR_URI" \
            --set image.tag="${{ steps.meta.outputs.tag }}" \
            -n dev \
            --atomic --wait --timeout 5m

      - name: Verify rollout
        run: kubectl get pods,svc,ingress -n dev

  # ===== TAG-DRIVEN STAGING DEPLOY =====
  deploy-staging:
    name: Deploy to staging
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://${{ vars.K3S_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "release=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Refresh ECR imagePullSecret
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          kubectl create secret docker-registry ecr-pull \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ vars.AWS_REGION }})" \
            --namespace=staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          ECR_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}"
          helm upgrade --install myapp ./chart \
            -f chart/values-staging.yaml \
            --set image.repository="$ECR_URI" \
            --set image.tag="${{ steps.meta.outputs.tag }}" \
            -n staging \
            --atomic --wait --timeout 5m

      - name: Verify rollout
        run: kubectl get pods,svc,ingress -n staging

  # ===== TAG-DRIVEN PROD DEPLOY (gated by approval) =====
  deploy-prod:
    name: Deploy to prod
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: prod              # required-reviewers config gates this job
      url: http://${{ vars.K3S_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Refresh ECR imagePullSecret
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          kubectl create secret docker-registry ecr-pull \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ vars.AWS_REGION }})" \
            --namespace=prod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          ECR_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}"
          helm upgrade --install myapp ./chart \
            -f chart/values-prod.yaml \
            --set image.repository="$ECR_URI" \
            --set image.tag="${{ steps.meta.outputs.tag }}" \
            -n prod \
            --atomic --wait --timeout 5m

      - name: Verify rollout
        run: kubectl get pods,svc,ingress -n prod
