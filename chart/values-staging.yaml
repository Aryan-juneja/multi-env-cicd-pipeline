# Staging: 1 replica on t3.micro to stay within 1 GiB RAM
replicaCount: 1

env:
  ENVIRONMENT: staging
  APP_VERSION: "0.1.0"

imagePullSecrets:
  - name: ecr-pull

ingress:
  enabled: true
  className: nginx
  host: staging.myapp.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 75m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 192Mi
