# Prod: 2 replicas (HA pair) — sized for t3.micro free tier
replicaCount: 2

env:
  ENVIRONMENT: prod
  APP_VERSION: "0.1.0"

imagePullSecrets:
  - name: ecr-pull

ingress:
  enabled: true
  className: nginx
  host: prod.myapp.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 80Mi
  limits:
    cpu: 300m
    memory: 192Mi
