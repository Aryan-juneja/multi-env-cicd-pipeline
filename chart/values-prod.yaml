# Prod: HA, headroom, full ingress host
replicaCount: 3

env:
  ENVIRONMENT: prod
  APP_VERSION: "0.1.0"

ingress:
  enabled: true
  className: nginx
  host: prod.myapp.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
